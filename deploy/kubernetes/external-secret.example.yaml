---
# ExternalSecret — pulls Neo4j credentials from an external secrets backend.
#
# Supported backends (choose one store, comment out the others):
#   - AWS Secrets Manager  (provider: aws)
#   - HashiCorp Vault      (provider: vault)
#   - GCP Secret Manager   (provider: gcpsm)
#
# Prerequisites:
#   1. Install External Secrets Operator: https://external-secrets.io/
#   2. Create a SecretStore or ClusterSecretStore for your backend.
#   3. Replace placeholder values below.
#
# This ExternalSecret will create a Kubernetes Secret named
# "graph-memory-secret" that matches the format expected by deployment.yaml.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: graph-memory-secret
spec:
  # How often to sync from the external store (2 min is suitable for most cases).
  refreshInterval: 2m

  secretStoreRef:
    # Replace with the name of your SecretStore or ClusterSecretStore.
    name: my-secret-store
    kind: ClusterSecretStore   # or SecretStore if namespace-scoped

  target:
    name: graph-memory-secret     # The Kubernetes Secret that will be created/updated
    creationPolicy: Owner
    template:
      type: Opaque
      # Map external secret keys → Kubernetes Secret keys
      data:
        GRAPH_MEMORY_NEO4J_USERNAME: "{{ .username }}"
        GRAPH_MEMORY_NEO4J_PASSWORD: "{{ .password }}"

  data:
    # AWS Secrets Manager example:
    #   Secret path: "prod/graph-memory/neo4j"
    #   Secret value (JSON): {"username":"neo4j","password":"<real-password>"}
    - secretKey: username
      remoteRef:
        # Replace with your secret path and the JSON key inside it.
        key: prod/graph-memory/neo4j
        property: username

    - secretKey: password
      remoteRef:
        key: prod/graph-memory/neo4j
        property: password

  # To use HashiCorp Vault instead, replace remoteRef blocks with:
  #   remoteRef:
  #     key: secret/data/graph-memory/neo4j
  #     property: username   # or password

  # To use GCP Secret Manager instead:
  #   remoteRef:
  #     key: projects/<project-id>/secrets/graph-memory-neo4j-username
