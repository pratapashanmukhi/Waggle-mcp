apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-memory
  annotations:
    # Prometheus pod auto-discovery
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  # minReadySeconds prevents traffic from reaching pods that haven't
  # passed readiness yet for at least this long (in seconds).
  minReadySeconds: 10
  # Keep two old ReplicaSets so rollbacks are instant.
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: graph-memory
  template:
    metadata:
      labels:
        app: graph-memory
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      # Run as a non-root user (UID 1000).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Ensure the pod is evicted from unhealthy nodes gracefully.
      terminationGracePeriodSeconds: 30
      containers:
        - name: graph-memory
          image: graph-memory-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: graph-memory-config
            - secretRef:
                name: graph-memory-secret
          # Hardened container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Writable scratch space for temp files / HTML exports
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-tmp
              mountPath: /app/tmp
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            # Allow up to 3 minutes for cold start (embedding model download)
            failureThreshold: 18
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-tmp
          emptyDir: {}
