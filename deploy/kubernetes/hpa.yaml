apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: graph-memory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: graph-memory
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale out when average CPU exceeds 70 %
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          # Scale out when average memory exceeds 80 %
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
