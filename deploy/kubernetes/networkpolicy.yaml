---
# Default deny-all for the namespace.
# Apply this first, then the explicit allow policies below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow the NGINX ingress controller to reach graph-memory on port 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-graph-memory
spec:
  podSelector:
    matchLabels:
      app: graph-memory
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              # Standard label on the ingress-nginx namespace; adjust if needed.
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

---
# Allow graph-memory to reach Neo4j on the Bolt port (7687).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-graph-memory-to-neo4j
spec:
  podSelector:
    matchLabels:
      app: graph-memory
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: neo4j
      ports:
        - protocol: TCP
          port: 7687

---
# Allow graph-memory to reach kube-dns for name resolution.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-graph-memory-dns
spec:
  podSelector:
    matchLabels:
      app: graph-memory
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Allow Prometheus scrapers (labelled app: prometheus) to reach the
# /metrics endpoint on port 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
spec:
  podSelector:
    matchLabels:
      app: graph-memory
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8080
