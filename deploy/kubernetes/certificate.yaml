---
# ClusterIssuer — Let's Encrypt Staging
# Use staging first to verify cert-manager is wired up, then switch to production.
# Staging certificates are signed but NOT trusted by browsers.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Replace with the email that should receive expiry notices.
    email: ops@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---
# ClusterIssuer — Let's Encrypt Production
# Switch ingress.yaml annotation to letsencrypt-prod once staging confirms OK.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---
# Certificate resource — cert-manager will create and renew this automatically.
# The secretName here must match the tls.secretName in ingress.yaml.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: graph-memory-tls
spec:
  secretName: graph-memory-tls
  # Switch issuerRef.name to letsencrypt-prod when ready.
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  commonName: graph-memory.example.com
  dnsNames:
    # Replace with your real hostname(s).
    - graph-memory.example.com
  # cert-manager will auto-renew 30 days before expiry.
  duration: 2160h   # 90 days
  renewBefore: 720h # 30 days
