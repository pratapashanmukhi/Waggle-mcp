version: "3.9"

# One-command local observability stack.
# Assumes graph-memory-mcp is already running (or started separately).
#
# Usage:
#   docker compose -f deploy/observability/docker-compose.observability.yml up -d
#   # Grafana → http://localhost:3000  (admin / admin)
#   # Prometheus → http://localhost:9090

services:
  # ── graph-memory-mcp ─────────────────────────────────────────────────────
  # (Comment this block out if you run graph-memory-mcp separately.)
  graph-memory:
    image: graph-memory-mcp:latest
    environment:
      GRAPH_MEMORY_TRANSPORT: http
      GRAPH_MEMORY_BACKEND: neo4j
      GRAPH_MEMORY_HTTP_HOST: "0.0.0.0"
      GRAPH_MEMORY_HTTP_PORT: "8080"
      GRAPH_MEMORY_DEFAULT_TENANT_ID: workspace-default
      GRAPH_MEMORY_LOG_LEVEL: INFO
      GRAPH_MEMORY_NEO4J_URI: bolt://neo4j:7687
      GRAPH_MEMORY_NEO4J_USERNAME: neo4j
      GRAPH_MEMORY_NEO4J_PASSWORD: change-me
      GRAPH_MEMORY_NEO4J_DATABASE: neo4j
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - obs

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19-community
    environment:
      NEO4J_AUTH: neo4j/change-me
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "change-me", "RETURN 1"]
      interval: 10s
      retries: 10
      timeout: 5s
    networks:
      - obs

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    networks:
      - obs

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-storage:/var/lib/grafana
      # Auto-provision the Prometheus datasource
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # Auto-provision the dashboard
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/graph-memory.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - obs

networks:
  obs:
    driver: bridge

volumes:
  grafana-storage:
