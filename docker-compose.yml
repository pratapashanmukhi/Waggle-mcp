# docker-compose.yml — Waggle MCP production deployment
# ─────────────────────────────────────────────────────
# Usage:
#   docker compose up -d            # normal mode (background warmup)
#   WAGGLE_STARTUP_MODE=fast docker compose up -d   # schema-only / inspection
#   WAGGLE_STARTUP_MODE=strict docker compose up -d # block until model ready
#
# Named volumes persist across restarts:
#   waggle-data   → SQLite database
#   waggle-cache  → Pre-baked embedding model (no re-download on restart)

version: "3.9"

services:
  waggle:
    image: ghcr.io/abhigyan-shekhar/waggle-mcp:latest
    # To build locally instead:
    # build: .
    restart: unless-stopped
    stdin_open: true   # required for stdio transport
    tty: false
    environment:
      WAGGLE_TRANSPORT: "${WAGGLE_TRANSPORT:-stdio}"
      WAGGLE_BACKEND: "${WAGGLE_BACKEND:-sqlite}"
      WAGGLE_DB_PATH: "/data/memory.db"
      WAGGLE_DEFAULT_TENANT_ID: "${WAGGLE_DEFAULT_TENANT_ID:-local-default}"
      WAGGLE_MODEL: "${WAGGLE_MODEL:-all-MiniLM-L6-v2}"
      # fast | normal | strict
      WAGGLE_STARTUP_MODE: "${WAGGLE_STARTUP_MODE:-normal}"
      WAGGLE_LOG_LEVEL: "${WAGGLE_LOG_LEVEL:-INFO}"
      WAGGLE_RATE_LIMIT_RPM: "${WAGGLE_RATE_LIMIT_RPM:-120}"
      WAGGLE_WRITE_RATE_LIMIT_RPM: "${WAGGLE_WRITE_RATE_LIMIT_RPM:-60}"
      WAGGLE_MAX_CONCURRENT_REQUESTS: "${WAGGLE_MAX_CONCURRENT_REQUESTS:-8}"
      WAGGLE_EXPORT_DIR: "/data/exports"
      # Model cache: point to the named volume
      HF_HOME: "/cache/huggingface"
      SENTENCE_TRANSFORMERS_HOME: "/cache/sentence-transformers"
      # Set to 1 once cache is known to be populated (prevents network call)
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-0}"
    volumes:
      - waggle-data:/data
      - waggle-cache:/cache
    ports:
      - "${WAGGLE_HTTP_PORT:-8080}:8080"
    healthcheck:
      # get_stats is embedding-free; always returns quickly
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('localhost',8080),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  waggle-data:
    driver: local
  waggle-cache:
    driver: local
