services:
  waggle:
    image: ghcr.io/abhigyan-shekhar/waggle-mcp:latest
    restart: unless-stopped
    environment:
      WAGGLE_TRANSPORT: "http"
      WAGGLE_BACKEND: "neo4j"
      WAGGLE_HTTP_HOST: "0.0.0.0"
      WAGGLE_HTTP_PORT: "8080"
      WAGGLE_DEFAULT_TENANT_ID: "${WAGGLE_DEFAULT_TENANT_ID:-workspace-default}"
      WAGGLE_API_KEY_ENVIRONMENT: "${WAGGLE_API_KEY_ENVIRONMENT:-live}"
      WAGGLE_LOG_LEVEL: "${WAGGLE_LOG_LEVEL:-INFO}"
      WAGGLE_RATE_LIMIT_RPM: "${WAGGLE_RATE_LIMIT_RPM:-120}"
      WAGGLE_WRITE_RATE_LIMIT_RPM: "${WAGGLE_WRITE_RATE_LIMIT_RPM:-60}"
      WAGGLE_MAX_CONCURRENT_REQUESTS: "${WAGGLE_MAX_CONCURRENT_REQUESTS:-8}"
      WAGGLE_NEO4J_URI: "bolt://neo4j:7687"
      WAGGLE_NEO4J_USERNAME: "${WAGGLE_NEO4J_USERNAME:-neo4j}"
      WAGGLE_NEO4J_PASSWORD: "${WAGGLE_NEO4J_PASSWORD:-change_me}"
      WAGGLE_NEO4J_DATABASE: "${WAGGLE_NEO4J_DATABASE:-neo4j}"
      WAGGLE_EXPORT_DIR: "/data/exports"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - waggle-data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8080),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/change_me}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL:-512m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-1g}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-512m}"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    expose:
      - "7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      waggle:
        condition: service_healthy
    environment:
      WAGGLE_DOMAIN: "${WAGGLE_DOMAIN:-localhost}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./examples/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  waggle-data:
  neo4j-data:
  neo4j-logs:
  caddy-data:
  caddy-config:
