name: Publish Waggle Image

on:
  push:
    tags:
      - "v*"          # triggers on v0.1.12, v1.0.0, etc.
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push pre-baked image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract version from the git tag (strips the leading "v")
      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/waggle-mcp
          tags: |
            # Immutable semver tag  →  ghcr.io/.../waggle-mcp:0.1.12
            type=semver,pattern={{version}}
            # Major.minor floating  →  ghcr.io/.../waggle-mcp:0.1
            type=semver,pattern={{major}}.{{minor}}
            # Rolling latest        →  ghcr.io/.../waggle-mcp:latest
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache — dramatically speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build for both amd64 and arm64 (Apple Silicon, AWS Graviton)
          platforms: linux/amd64,linux/arm64

  # ── Smoke-test the published image ─────────────────────────────────────────
  smoke-test:
    name: Smoke-test image
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Pull published image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/waggle-mcp:${{ github.ref_name }}

      - name: Verify tool listing responds instantly (fast mode)
        run: |
          # Fast mode must respond within 5 s with zero ML overhead
          timeout 5 docker run --rm \
            -e WAGGLE_STARTUP_MODE=fast \
            -e WAGGLE_TRANSPORT=stdio \
            ghcr.io/${{ github.repository_owner }}/waggle-mcp:${{ github.ref_name }} \
            python -c "
          from waggle.config import AppConfig
          from waggle.server import WaggleServer
          import os
          os.environ['WAGGLE_STARTUP_MODE'] = 'fast'
          os.environ['WAGGLE_DB_PATH'] = '/tmp/smoke-test.db'
          cfg = AppConfig.from_env()
          srv = WaggleServer(config=cfg)
          tools = srv.build_tools()
          assert len(tools) > 10, f'Expected >10 tools, got {len(tools)}'
          print(f'OK: {len(tools)} tools registered in fast mode')
          "
