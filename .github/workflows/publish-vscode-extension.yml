name: Publish VS Code Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vscode-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-vscode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/vscode-extension

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run command validation
        run: npm test

      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: waggle-memory-vsix
          path: apps/vscode-extension/*.vsix

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::notice::VSCE_PAT not set; skipping marketplace publish."
            exit 0
          fi
          npx @vscode/vsce publish

      - name: Upload VSIX to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: apps/vscode-extension/*.vsix
